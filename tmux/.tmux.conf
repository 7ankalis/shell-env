############################
# CORE & FIXES
############################
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g escape-time 0
set -g repeat-time 300
set -g focus-events on

# Fix naming: Total lockdown on window titles
setw -g automatic-rename off
set -g allow-rename off
set -g renumber-windows on

############################
# PREFIX (CTRL+S)
############################
unbind C-b
set -g prefix C-s
bind C-s send-prefix

############################
# NAVIGATION & PANES
############################
unbind r
bind r source-file ~/.tmux.conf \; display-message "󰑓 Ubuntu Config Reloaded"

setw -g mode-keys vi
set -g status-keys vi

# Splits (starts in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

############################
# STATUS BAR (UBUNTU HACKER EDITION)
############################
set -g status-position top
set -g status-interval 3
set -g status-style "bg=default"

# LEFT: Ubuntu Icon + Session
set -g status-left-length 60
set -g status-left "#[fg=#1e1e2e,bg=#E95420,bold]  #S #[fg=#E95420,bg=default] "

# WINDOWS: Modern Pill Style
setw -g window-status-separator " "
setw -g window-status-format "#[fg=#585b70,bg=default]#[fg=#cdd6f4,bg=#313244]#I:#W#[fg=#313244,bg=default]"
setw -g window-status-current-format "#[fg=#E95420,bg=default]#[fg=#ffffff,bg=#E95420,bold]#I:#W#[fg=#E95420,bg=default]"

# RIGHT: CPU, Battery, Time
set -g status-right-length 100
set -g status-right "#[fg=#45475a,bg=default]#[fg=#f5e0dc,bg=#45475a]󰍛 #{cpu_percentage} #[fg=#45475a,bg=default] #[fg=#45475a,bg=default]#[fg=#a6e3a1,bg=#45475a]󱊣 #{battery_percentage} #[fg=#45475a,bg=default] #[fg=#E95420,bg=default]#[fg=#ffffff,bg=#E95420,bold]%H:%M #[fg=#E95420,bg=default]"

############################
# BORDERS & UI
############################
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#E95420"
set -g message-style "bg=#313244,fg=#E95420"
set -g window-style "fg=#7f849c"
set -g window-active-style "fg=#cdd6f4"

############################
# THE "SCRATCHPAD" (HACKER TOOL)
############################
# Press Prefix + u to toggle a small popup terminal
bind u display-popup -E -w 70% -h 70% "bash"

############################
# PLUGINS
############################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

run '~/.tmux/plugins/tpm/tpm'
